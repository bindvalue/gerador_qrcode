<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Gerador de QR Code - SaaS</title>
  <link rel="icon" type="image/png" href="https://github.com/bindvalue/images/blob/main/Artboard10@4x.png?raw=true">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <img src="https://raw.githubusercontent.com/bindvalue/website/refs/heads/main/images/Artboard%201_9logo-branca.png" alt="Logo bindvalue" />
    </div>
    <h1>Gerador de QR Code</h1>
    <p class="subtitle">Crie QR Codes para suas instâncias Evolution API</p>
    <div class="initial-instructions" id="initialInstructions">
      <span class="icon">💡</span>
      <strong>Como usar:</strong><br>
      1. Digite o nome da sua instância<br>
      2. Clique em "Gerar QR Code"<br>
      3. Escaneie o código com seu WhatsApp<br>
      4. Aguarde a sincronização automática
    </div>
    <div class="input-group">
      <label for="instanceName">Nome da Instância</label>
      <input type="text" id="instanceName" placeholder="Digite o nome da instância" required>
    </div>
    <button id="generateButton" onclick="generateQRCode()">
      <span class="status-indicator generating" id="statusIndicator" style="display: none;"></span>
      <span id="buttonText">Gerar QR Code</span>
    </button>
    <button id="stopButton" class="secondary-button" onclick="stopQRCodePolling()" type="button">Parar geração</button>
    <div id="connectionStatus" class="status-message" aria-live="polite">
      <span class="status-indicator waiting" id="connectionIndicator" style="display: none;"></span>
      <span id="connectionMessageText">Pronto para gerar seu QR Code e verificar a conexão.</span>
    </div>
    <div id="loader" class="loader"></div>
    <div class="qr-section" id="qrSection">
      <div id="qrcode" class="empty">Gerando QR Code...</div>
      <div id="timer" style="display: none;"></div>
    </div>
  </div>

  <script>
    function setViewportHeight() {
      let vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }

    window.addEventListener('resize', setViewportHeight);
    setViewportHeight();

    let timerInterval;
    let connectionInterval;
    let connectionAttempts = 0;
    let timeLeft = 30;
    let currentInstanceName = '';
    let qrCodeGenerated = false;
    let connected = false;
    const CONNECTION_POLL_INTERVAL = 5000;
    const MAX_POLL_ATTEMPTS = 36;

    function setConnectionMessage(text, type = 'waiting') {
      const connectionIndicator = document.getElementById('connectionIndicator');
      const connectionText = document.getElementById('connectionMessageText');
      if (!connectionIndicator || !connectionText) {
        console.warn('Connection status elements not found in DOM.');
        return;
      }
      connectionIndicator.style.display = 'inline-block';
      connectionIndicator.className = `status-indicator ${type}`;
      connectionText.textContent = text;
    }

    function resetConnectionState() {
      connected = false;
      connectionAttempts = 0;
      clearInterval(connectionInterval);
      clearInterval(timerInterval);
      timeLeft = 30;
      document.getElementById('timer').style.display = 'none';
      toggleStopButton(false);
      setConnectionMessage('Preparando chamada ao webhook...', 'waiting');
      updateStatus('generating');
    }

    function stopConnectionPolling() {
      clearInterval(connectionInterval);
      clearInterval(timerInterval);
      document.getElementById('timer').style.display = 'none';
      toggleStopButton(false);
    }

    function toggleStopButton(show) {
      const stopButton = document.getElementById('stopButton');
      if (!stopButton) return;
      stopButton.style.display = show ? 'flex' : 'none';
    }

    function stopQRCodePolling() {
      stopConnectionPolling();
      updateStatus('regenerate');
      setConnectionMessage('Geração de QR code interrompida pelo usuário.', 'error');
      document.getElementById('generateButton').disabled = false;
    }

    function hideQRCodeSection() {
      const qrSection = document.getElementById('qrSection');
      if (qrSection) {
        qrSection.classList.remove('show');
        qrSection.style.display = 'none';
      }
    }

    function connectionSuccess(message) {
      connected = true;
      stopConnectionPolling();
      updateStatus('connected');
      document.getElementById('generateButton').disabled = false;
      setConnectionMessage(message || 'Sua instância foi conectada com sucesso.', 'connected');
      toggleStopButton(false);
      setTimeout(hideQRCodeSection, 1000);
    }

    function showQRSection() {
      document.getElementById('initialInstructions').style.display = 'none';
      const qrSection = document.getElementById('qrSection');
      if (qrSection) {
        qrSection.style.display = 'block';
        qrSection.classList.add('show');
      }
      qrCodeGenerated = true;
    }

    function updateStatus(status) {
      const statusIndicator = document.getElementById('statusIndicator');
      const buttonText = document.getElementById('buttonText');
      statusIndicator.style.display = 'inline-block';
      if (status === 'generating') {
        statusIndicator.className = 'status-indicator generating';
        buttonText.textContent = 'Gerando QR Code...';
      } else if (status === 'waiting') {
        statusIndicator.className = 'status-indicator waiting';
        buttonText.textContent = 'Aguardando Sincronização';
      } else if (status === 'connected') {
        statusIndicator.className = 'status-indicator connected';
        buttonText.textContent = 'Conectado';
      } else if (status === 'regenerate') {
        statusIndicator.style.display = 'none';
        buttonText.textContent = 'Gerar Novo QR Code';
      } else {
        statusIndicator.style.display = 'none';
        buttonText.textContent = 'Gerar QR Code';
      }
    }

    async function generateQRCode() {
      const instanceName = document.getElementById('instanceName').value.trim();
      if (!instanceName) {
        setConnectionMessage('Por favor, insira o nome da instância para continuar.', 'error');
        return;
      }
      if (instanceName.length < 3) {
        setConnectionMessage('O nome da instância deve ter pelo menos 3 caracteres.', 'error');
        return;
      }
      currentInstanceName = instanceName;
      if (!qrCodeGenerated) showQRSection();
      resetConnectionState();
      await fetchAndDisplayQRCode(instanceName, true);
      if (!connected) {
        startConnectionPolling();
      }
    }

    async function fetchAndDisplayQRCode(instanceName, isInitial = false) {
      const loader = document.getElementById('loader');
      const generateButton = document.getElementById('generateButton');
      const qrcodeElement = document.getElementById('qrcode');
      updateStatus(isInitial ? 'generating' : 'waiting');
      loader.style.display = 'block';
      generateButton.disabled = true;
      if (isInitial || !qrcodeElement.querySelector('img')) {
        qrcodeElement.textContent = 'Gerando QR Code...';
        qrcodeElement.classList.add('empty');
      }
      try {
        const endpoint = isInitial
          ? 'https://n8n.bindvalue.com.br/webhook/criar-instancia-evolution'
          : 'https://n8n.bindvalue.com.br/webhook/atualizar-qr-code';
        const response = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ instanceName })
        });
        if (!response.ok) throw new Error(`Erro ${response.status}: ${response.statusText}`);

        const contentType = response.headers.get('content-type') || '';
        let imgSrc = null;
        let statusData = {};

        if (contentType.includes('application/json')) {
          const responseText = await response.text();
          if (responseText.trim()) {
            try {
              statusData = JSON.parse(responseText);
            } catch (jsonError) {
              throw new Error('Resposta JSON inválida do webhook.');
            }
          }

          if (statusData.qrCodeBase64) {
            imgSrc = `data:image/png;base64,${statusData.qrCodeBase64}`;
          } else if (statusData.qrCodeUrl) {
            imgSrc = statusData.qrCodeUrl;
          } else if (statusData.error) {
            throw new Error(statusData.error);
          } else if (isInitial) {
            throw new Error('QR Code não recebido na resposta');
          }
        } else {
          const blob = await response.blob();
          if (blob.size > 0) {
            imgSrc = URL.createObjectURL(blob);
          }
        }

        if (imgSrc) {
          qrcodeElement.innerHTML = `<img src="${imgSrc}" alt="QR Code para ${instanceName}" class="slide-in">`;
          qrcodeElement.classList.remove('empty');
        } else if (isInitial && !qrcodeElement.querySelector('img')) {
          throw new Error('QR Code não foi retornado pelo webhook.');
        }

        const isConnected = parseConnectionMessage(statusData);

        if (isConnected) {
          const successText = statusData.message || statusData.status || statusData.state || `Instância "${instanceName}" conectada com sucesso.`;
          connectionSuccess(successText);
          return;
        }

        if (isInitial) {
          setConnectionMessage(`QR Code criado com sucesso para a instância "${instanceName}". Escaneie com seu WhatsApp para conectar.`, 'waiting');
        }

        if (!connected) {
          updateStatus('waiting');
          document.getElementById('timer').style.display = 'block';
          setConnectionMessage('Aguardando conexão. O sistema verificará automaticamente em instantes.', 'waiting');
        }
      } catch (error) {
        console.error('Erro ao gerar QR code:', error);
        if (!qrcodeElement.querySelector('img')) {
          qrcodeElement.textContent = 'Erro ao carregar QR Code. Tente novamente.';
          qrcodeElement.classList.add('empty');
        }
        updateStatus('regenerate');
        setConnectionMessage(`Erro: ${error.message}. Verifique o webhook ou tente novamente.`, 'error');
      } finally {
        loader.style.display = 'none';
        generateButton.disabled = connected;
      }
    }

    function startConnectionPolling() {
      clearInterval(connectionInterval);
      clearInterval(timerInterval);
      timeLeft = 30;
      connectionAttempts = 0;
      toggleStopButton(true);
      connectionInterval = setInterval(async () => {
        connectionAttempts += 1;
        if (connected || connectionAttempts > MAX_POLL_ATTEMPTS) {
          stopConnectionPolling();
          if (!connected) {
            setConnectionMessage('Não foi possível confirmar a conexão. Tente novamente mais tarde.', 'error');
          }
          return;
        }
        await fetchAndDisplayQRCode(currentInstanceName);
      }, CONNECTION_POLL_INTERVAL);
      timerInterval = setInterval(updateTimer, 1000);
    }

    function updateTimer() {
      const timerElement = document.getElementById('timer');
      if (connected) {
        timerElement.style.display = 'none';
        return;
      }
      timerElement.innerHTML = `<span class="status-indicator waiting"></span>Próxima verificação em: ${timeLeft}s`;
      if (timeLeft === 0) {
        timeLeft = 30;
      } else {
        timeLeft--;
      }
    }

    function parseConnectionMessage(data) {
      return data?.connected === true
        || data?.status === 'connected'
        || data?.state === 'connected'
        || String(data?.message || '').toLowerCase().includes('conectado');
    }

    async function updateQRCode() {
      if (currentInstanceName && !connected) await fetchAndDisplayQRCode(currentInstanceName);
    }

    document.getElementById('instanceName').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') generateQRCode();
    });

    if (window.matchMedia('(hover: hover)').matches) {
      document.querySelectorAll('button').forEach(button => {
        button.addEventListener('click', function(e) {
          const ripple = document.createElement('span');
          const rect = this.getBoundingClientRect();
          const size = Math.max(rect.width, rect.height);
          const x = e.clientX - rect.left - size / 2;
          const y = e.clientY - rect.top - size / 2;
          ripple.style.width = ripple.style.height = size + 'px';
          ripple.style.left = x + 'px';
          ripple.style.top = y + 'px';
          ripple.classList.add('ripple');
          this.appendChild(ripple);
          setTimeout(() => ripple.remove(), 600);
        });
      });
    }

    window.addEventListener('load', () => document.getElementById('instanceName').focus());
  </script>
</body>
</html>
